  <rect x="120" y="140" width="712" height="52" rx="14" fill="#12372c"/>
  <rect x="120" y="220" width="220" height="166" rx="18" fill="rgba(98,216,78,0.10)" stroke="#62d84e" stroke-width="2"/>
  <rect x="360" y="220" width="220" height="166" rx="18" fill="rgba(86,199,255,0.10)" stroke="#56c7ff" stroke-width="2"/>
  <rect x="600" y="220" width="232" height="166" rx="18" fill="rgba(157,255,122,0.10)" stroke="#9dff7a" stroke-width="2"/>
  <path d="M260 388v52" stroke="#2f5649" stroke-width="4"/>
