<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Operations and service workflow diagram</title>
  <desc id="desc">Incident, change, catalog, and knowledge operations inside a service workflow.</desc>
  <rect width="960" height="540" rx="32" fill="#061a14"/>
  <circle cx="180" cy="270" r="120" fill="rgba(98,216,78,0.10)"/>
  <circle cx="480" cy="270" r="120" fill="rgba(86,199,255,0.10)"/>
  <circle cx="780" cy="270" r="120" fill="rgba(157,255,122,0.10)"/>
  <path d="M300 270h80" stroke="#eafff6" stroke-width="6" stroke-linecap="round"/>
  <path d="M600 270h80" stroke="#eafff6" stroke-width="6" stroke-linecap="round"/>
  <text x="136" y="264" fill="#eafff6" font-family="Arial, sans-serif" font-size="24" font-weight="700">Incident</text>
  <text x="146" y="296" fill="#a9c9bd" font-family="Arial, sans-serif" font-size="18">restore service</text>
  <text x="439" y="264" fill="#eafff6" font-family="Arial, sans-serif" font-size="24" font-weight="700">Change</text>
  <text x="438" y="296" fill="#a9c9bd" font-family="Arial, sans-serif" font-size="18">control risk</text>
  <text x="723" y="264" fill="#eafff6" font-family="Arial, sans-serif" font-size="24" font-weight="700">Catalog</text>
  <text x="722" y="296" fill="#a9c9bd" font-family="Arial, sans-serif" font-size="18">fulfill requests</text>
  <text x="116" y="90" fill="#9dff7a" font-family="Arial, sans-serif" font-size="28" font-weight="700">Service operations</text>
  <text x="116" y="444" fill="#a9c9bd" font-family="Arial, sans-serif" font-size="22">Use operational records to drive support and governance</text>
</svg>